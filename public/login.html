<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>千聊 GEO 监控 — 登录</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-[100dvh] flex items-center justify-center bg-gray-50">
<div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-8 w-full max-w-sm">
  <div class="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center text-white font-bold text-lg mx-auto mb-4">G</div>
  <h1 class="text-lg font-semibold text-center mb-6">千聊 GEO 监控系统</h1>
  <input id="pwdInput" type="password" placeholder="请输入访问密码" class="w-full mb-3" style="border:1px solid #d1d5db;border-radius:10px;padding:10px 14px;font-size:14px" onkeydown="event.key==='Enter'&&doLogin()">
  <button onclick="doLogin()" class="w-full py-2.5 rounded-xl bg-blue-600 text-white font-medium text-sm hover:bg-blue-700 transition-colors">登录</button>
  <div id="error" class="text-red-500 text-xs text-center mt-3" style="display:none"></div>
</div>
<script>
async function doLogin() {
  const pwd = document.getElementById('pwdInput').value;
  const r = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pwd }) });
  if (r.ok) { window.location.href = '/dashboard'; return; }
  document.getElementById('error').style.display = 'block';
  document.getElementById('error').textContent = '密码错误';
}
</script>
</body>
</html>
